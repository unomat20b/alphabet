# Сборка Flutter Web и выкладка в …/public_html/alphabet на Timeweb (остальной сайт не трогаем).
# Секреты: TIMEWEB_SSH_KEY, TIMEWEB_HOST, TIMEWEB_USER, TIMEWEB_REMOTE_PATH (как у intellectshop.frontend).

name: Build Flutter web and deploy to Timeweb

on:
  push:
    branches: [main]
    paths:
      - "lib/**"
      - "web/**"
      - "assets/**"
      - "langs/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/deploy-web-timeweb.yml"
  workflow_dispatch:

concurrency:
  group: timeweb-alphabet-web
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build web
        run: |
          flutter pub get
          flutter build web --base-href /alphabet/

      - name: SSH key and known_hosts
        env:
          SSH_PRIVATE_KEY: ${{ secrets.TIMEWEB_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/timeweb_deploy
          chmod 600 ~/.ssh/timeweb_deploy
          ssh-keyscan -H "${{ secrets.TIMEWEB_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync build/web → Timeweb …/alphabet
        env:
          REMOTE: ${{ secrets.TIMEWEB_USER }}@${{ secrets.TIMEWEB_HOST }}
          RPATH: ${{ secrets.TIMEWEB_REMOTE_PATH }}
        run: |
          set -euo pipefail
          test -n "$RPATH"
          rsync -avz --delete \
            -e "ssh -i $HOME/.ssh/timeweb_deploy -o IdentitiesOnly=yes -o BatchMode=yes" \
            build/web/ "$REMOTE:$RPATH/alphabet/"
